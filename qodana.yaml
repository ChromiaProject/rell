version: "1.0"

# Pinned to match .gitlab-ci.yml
linter: jetbrains/qodana-jvm-community:2025.3

profile:
  name: qodana.recommended
  inspections:
    - inspection: UnusedImport
      severity: INFO
    - inspection: ClassName
      enabled: false
    - inspection: PrivatePropertyName
      enabled: false
    - inspection: FunctionName
      enabled: false
    - inspection: LocalVariableNamingConvention
      enabled: false
    - inspection: LocalVariableName
      enabled: false

# Exclude build output and Gradle/IDE caches from all inspections. The `build` entry also covers ANTLR-generated Java.
exclude:
  - name: All
    paths:
      - build
      - .gradle
