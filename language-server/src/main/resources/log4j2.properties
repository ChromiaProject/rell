# Set to debug or trace if log4j initialization is failing
status=warn
# Name of the configuration
name=LanguageServerLogger
# RollingFile Appender
appender.rolling.type=RollingFile
appender.rolling.name=RollingFile
appender.rolling.fileName=${sys:java.io.tmpdir}/rell-language-server/lsp.log
appender.rolling.filePattern=${sys:java.io.tmpdir}/rell-language-server/lsp-%i.log
appender.rolling.layout.type=PatternLayout
appender.rolling.layout.pattern=%-5level %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %c{1} - %msg%n
appender.rolling.filter.threshold.type=ThresholdFilter
appender.rolling.filter.threshold.level=debug
appender.rolling.policies.type=Policies
appender.rolling.policies.size.type=SizeBasedTriggeringPolicy
appender.rolling.policies.size.size=10MB
appender.rolling.strategy.type=DefaultRolloverStrategy
appender.rolling.strategy.max=10

# Console appender configuration
appender.console.type=Console
appender.console.name=ConsoleLogger
appender.console.layout.type=PatternLayout
appender.console.layout.pattern=%-5level %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %c{1} - %msg%n
appender.console.filter.threshold.type=ThresholdFilter
appender.console.filter.threshold.level=info

# Sentry appender configuration
appender.sentry.type=Sentry
appender.sentry.name=Sentry
appender.sentry.dsn=https://619cb59386ad15383c7a2a157717dd3c@o4508080756162560.ingest.de.sentry.io/4508210934579280
appender.sentry.minimumEventLevel=ERROR
appender.sentry.minimumBreadcrumbLevel=WARN

# Root logger level
rootLogger.level=info
# Root logger referring to console appender
rootLogger.appenderRefs=console, sentry
rootLogger.appenderRef.console.ref=ConsoleLogger
rootLogger.appenderRef.sentry.ref=Sentry
