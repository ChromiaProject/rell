[versions]
rell = "0.13.2"
testcontainers = "1.18.3"

[libraries]
rell = { module = "net.postchain.rell:rell-api-base", version.ref = "rell" }
rell-tools = { module = "net.postchain.rell:rell-tools", version.ref = "rell" }

#Testing
testcontainers-base = { module = "org.testcontainers:testcontainers", version.ref = "testcontainers" }
testcintainers-junit = { module = "org.testcontainers:junit-jupiter", version.ref = "testcontainers" }


#logging
oshai = { module = "io.github.oshai:kotlin-logging-jvm", version = "5.1.0" }
log4j = { module = "org.apache.logging.log4j:log4j-slf4j-impl", version = "2.20.0" }
log4j-core = { module = "org.apache.logging.log4j:log4j-core", version = "2.20.0" }

[bundles]
testcontainers = ["testcontainers-base", "testcintainers-junit"]
logging = ["oshai", "log4j", "log4j-core"]