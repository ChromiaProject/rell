[versions]
rell = "0.14.9"
testcontainers = "1.18.3"
lsp4j = "0.23.1"
koin = "3.5.0"
jackson = "2.15.3"
antlr = "4.13.1"
assertk = "0.27.0"
kotlin-test = "1.9.10"
oshai = "5.1.0"
log4j = "2.20.0"
slf4j = "1.7.36"
mockk = "1.13.8"
ec4j = "0.3.0"
java-diff-utils = "4.12"
chromia-build-tools = "0.5.1"
fury-core = "0.4.1"
system-stubs-jupiter = "2.1.7"
sentry-log4j2 = '7.16.0'

[libraries]
rell-base = { module = "net.postchain.rell:rell-base", version.ref = "rell" }
rell-api-base = { module = "net.postchain.rell:rell-api-base", version.ref = "rell" }

chromia-build-tools = { module = "com.chromia.cli.tools:chromia-build-tools", version.ref = "chromia-build-tools" }

ec4j = { module = "org.ec4j.core:ec4j-core", version.ref = "ec4j" }

java-diff-utils = { module = "io.github.java-diff-utils:java-diff-utils", version.ref = "java-diff-utils" }

fury-core = { module = "org.furyio:fury-core", version.ref = "fury-core" }

lsp4j = { module = "org.eclipse.lsp4j:org.eclipse.lsp4j", version.ref = "lsp4j" }
lsp4j-debug = { module = "org.eclipse.lsp4j:org.eclipse.lsp4j.debug", version.ref = "lsp4j" }
lsp4j-websocket = { module = "org.eclipse.lsp4j:org.eclipse.lsp4j.websocket", version.ref = "lsp4j" }

koin-core = { module = "io.insert-koin:koin-core", version.ref = "koin" }
koin-logger = { module = "io.insert-koin:koin-logger-slf4j", version.ref = "koin" }

jackson = { module = "com.fasterxml.jackson.core:jackson-databind", version.ref = "jackson" }
jackson-yml = { module = "com.fasterxml.jackson.dataformat:jackson-dataformat-yaml", version.ref = "jackson" }
jackson-kotlin = { module = "com.fasterxml.jackson.module:jackson-module-kotlin", version.ref = "jackson" }

antlr = { module = "org.antlr:antlr4", version.ref = "antlr" }
antlr-runtime = { module = "org.antlr:antlr4-runtime", version.ref = "antlr" }
sentry-log4j2 = { module = "io.sentry:sentry-log4j2", version.ref = "sentry-log4j2" }

kotlin-test-junit = { module = "org.jetbrains.kotlin:kotlin-test-junit5", version.ref = "kotlin-test" }
kotlin-test-junit-parameter = { module = "org.junit.jupiter:junit-jupiter-params", version.ref = "kotlin-test" }

assertk = { module = "com.willowtreeapps.assertk:assertk-jvm", version.ref = "assertk" }
mockk = { module = "io.mockk:mockk", version.ref = "mockk" }

#Testing
testcontainers-base = { module = "org.testcontainers:testcontainers", version.ref = "testcontainers" }
testcintainers-junit = { module = "org.testcontainers:junit-jupiter", version.ref = "testcontainers" }
system-stubs-jupiter = { module = "uk.org.webcompere:system-stubs-jupiter", version.ref = "system-stubs-jupiter" }

#logging
oshai = { module = "io.github.oshai:kotlin-logging-jvm", version.ref = "oshai" }
log4j = { module = "org.apache.logging.log4j:log4j-slf4j2-impl", version.ref = "log4j" }
log4j-core = { module = "org.apache.logging.log4j:log4j-core", version.ref = "log4j" }
log4j-jul = { module = "org.apache.logging.log4j:log4j-jul", version.ref = "log4j" }
slf4j = { module = "org.slf4j:slf4j-api", version.ref = "slf4j" }

[bundles]
testcontainers = ["testcontainers-base", "testcintainers-junit"]
logging = ["oshai", "log4j", "log4j-core", "log4j-jul"]
rell = ["rell-base"]
lsp4j = ["lsp4j", "lsp4j-debug", "lsp4j-websocket"]
koin = ["koin-core", "koin-logger"]
jackson = ["jackson", "jackson-yml", "jackson-kotlin"]
testing = ["kotlin-test-junit", "assertk", "mockk", "kotlin-test-junit-parameter", "system-stubs-jupiter"]
