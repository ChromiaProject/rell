# GitLab Pages deployments: the static portal index plus the four manual report jobs
# (docs / benchmarks / profile / regression). The index is republished automatically after each
# manual job so the listing stays current.

# Client-side portal index listing every available `pages:docs` / `pages:benchmarks` /
# `pages:profile` / `pages:regression` deployment, plus a profile-diff tool. The project is
# private, so anonymous client-side fetches against the Environments API 401 — build-index.sh
# bakes the list into `manifest.json` at publish time via `glab api`, and the app fetches that +
# per-deployment /data/main.json from the browser.
#
# Requires GITLAB_TOKEN (project access token with `read_api`, masked + dev-branch-protected).
# CI_JOB_TOKEN's allowlist excludes the Environments API, so it 403s.
#
# Pinned to dev so feature branches can't overwrite the root deployment. Re-published in the
# `index` stage after each manual click (see `pages:index:after-*`), keeping the listing fresh
# when manual jobs are clicked days after the initial dev pipeline ran.
.pages-index:
  image: registry.gitlab.com/gitlab-org/cli:latest
  interruptible: true
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
  script:
    - apk add --no-cache jq curl
    - mkdir -p public
    - performance/ci-index/build-index.sh public
  pages: true
  environment:
    name: pages-index
    url: "$CI_PAGES_URL/"
  artifacts:
    paths: [ public ]
    expire_in: 30 days

pages:index:
  extends: .pages-index
  stage: deploy
  needs: []

# Re-publish the index after each manual click so the new deployment shows up. `needs:` keeps
# this pending alongside the unclicked manual job (harmless — same lifecycle). The deploy-stage
# `pages:index` already covers the no-click case; these fill the "click days later" gap.
pages:index:after-bench:
  extends: .pages-index
  stage: index
  needs: [ pages:benchmarks ]

pages:index:after-profile:
  extends: .pages-index
  stage: index
  needs: [ pages:profile ]

pages:index:after-regression:
  extends: .pages-index
  stage: index
  needs: [ pages:regression ]

pages:index:after-docs:
  extends: .pages-index
  stage: index
  needs: [ pages:docs ]

# Manual benchmark / profile runs publishing HTML to GitLab Pages under per-commit path prefixes
# (`bench-<slug>-<sha>` / `profile-<slug>-<sha>`); including the short SHA lets same-branch
# reruns coexist for diffing. Benchmark JSON is also exposed at /data/main.json so external
# tooling can fetch raw scores without scraping HTML.
pages:benchmarks:
  stage: portal
  tags: [ saas-linux-medium-amd64 ]
  interruptible: true
  rules:
    - when: manual
      allow_failure: true
  needs: []
  script:
    - ./gradlew $GRADLE_FLAGS_MEDIUM :performance:mainBenchmark
    - mkdir -p public public/data
    - cp -r performance/build/reports/benchmarks/html/. public/
    # Publish the raw kotlinx-benchmark JSON alongside the HTML for programmatic ingest
    # (commit-to-commit regression diffs). Plugin writes to reports/benchmarks/main/<ts>/main.json;
    # pick the newest and expose it at the stable URL `<deployment>/data/main.json`.
    - |
      latest_json=$(find performance/build/reports/benchmarks/main -type f -name '*.json' -printf '%T@ %p\n' | sort -nr | head -n1 | cut -d' ' -f2-)
      if [ -z "$latest_json" ]; then
        echo "ERROR: no benchmark JSON found under performance/build/reports/benchmarks/main" >&2
        exit 1
      fi
      cp "$latest_json" public/data/main.json
      echo "Published $latest_json -> public/data/main.json"
    - echo "Benchmark report - $CI_PAGES_URL/report.html"
    - echo "Benchmark JSON   - $CI_PAGES_URL/data/main.json"
  pages:
    path_prefix: "bench-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    expire_in: never
  environment:
    name: "benchmarks/$CI_COMMIT_REF_SLUG/$CI_COMMIT_SHORT_SHA"
    url: "$CI_PAGES_URL/report.html"
  artifacts:
    paths: [ public ]
    expire_in: 30 days

# Manual end-to-end profiler (Postgres + chr node + async-profiler + workload + HTML).
# Extends `.local-chr-cache` for the DIND Postgres wiring and the persistent .m2 cache.
pages:profile:
  extends: .local-chr-cache
  stage: portal
  tags: [ saas-linux-medium-amd64 ]
  interruptible: true
  rules:
    - when: manual
      allow_failure: true
  needs: []
  script:
    - ./gradlew $GRADLE_FLAGS_MEDIUM :performance:profile
    - mkdir -p public
    - cp -r performance/reports/. public/
    - echo "Profile report - $CI_PAGES_URL/report.html"
  pages:
    path_prefix: "profile-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    expire_in: never
  environment:
    name: "profile/$CI_COMMIT_REF_SLUG/$CI_COMMIT_SHORT_SHA"
    url: "$CI_PAGES_URL/report.html"
  artifacts:
    when: always
    paths: [ public ]
    expire_in: 30 days

# Manual regression toolkit: clone every public Rell project and verify the local build compiles
# (and tests) them. Off the default pipeline — full runs take tens of minutes. Public-only flavour
# wired here; `private.json` is gitignored and never reaches the runner.
#
# On saas-linux-xlarge-amd64 (16c/64G): one JUnit test JVM runs the @TestFactory in
# regression/test/regression/RegressionTest.kt; (project, backend) parallelism is JUnit Jupiter's
# job, capped at `regressionParallelism` (8 here). Each (project, backend) unit operates on its
# own working copy under `workdir/<project>-<backend>/` (mirrored from the master clone by
# `refreshBackendCopy` in regression/src/regression/compile.kt), so concurrent `chr install`
# calls never race on the shared `src/lib/<name>` clone tree. chr itself runs out-of-process via
# ProcessBuilder, so the ~2.5 GB chr JVM is *outside* the test JVM's heap budget. Each unit also
# leases its own throw-away Testcontainers Postgres for the duration of its pipeline
# (`withProjectPostgres`).
#
# Peak per slot ≈ 2.5 GB chr subprocess + 1.2 GB Postgres container (process + 1 GB tmpfs cap,
# lazy fill) ≈ 3.7 GB OS-level. 8 slots ≈ 30 GB + 4 GB test JVM heap + 4 GB Gradle daemon +
# ~6 GB OS/DIND/non-heap ≈ 44 GB, comfortably under the xlarge envelope. (`--max-workers=8` from
# $GRADLE_FLAGS_XLARGE is unused by the regression Test task itself — fan-out is JUnit's — but
# the up-front `:performance:buildLocalChr` task graph still benefits.)
#
# Extends `.local-chr-cache-no-postgres`: the regression toolkit brings its own per-project
# Postgres, so the shared DIND instance from `.setup` would just sit idle.
# `expectedFailure: true` projects in public.json aren't regressions; `ignoreFailures = true` on
# the regression Test task already keeps a single compile blowup off the build status, and
# `allow_failure: true` here is belt-and-braces.
pages:regression:
  extends: .local-chr-cache-no-postgres
  stage: portal
  tags: [ saas-linux-xlarge-amd64 ]
  interruptible: true
  rules:
    - when: manual
      allow_failure: true
  needs: []
  script:
    - ./gradlew $GRADLE_FLAGS_XLARGE -PregressionParallelism=8 :regression:regressionPublic
    - mkdir -p public
    - cp -r regression/reports/. public/
    - echo "Regression report - $CI_PAGES_URL/report.html"
    - echo "Regression JSON   - $CI_PAGES_URL/results.json"
  pages:
    path_prefix: "regression-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    expire_in: never
  environment:
    name: "regression/$CI_COMMIT_REF_SLUG/$CI_COMMIT_SHORT_SHA"
    url: "$CI_PAGES_URL/report.html"
  artifacts:
    when: always
    paths: [ public ]
    expire_in: 30 days

# Manual Rell stdlib documentation publish: build local chr against the snapshot Rell, then run
# `chr generate docs-site --system` (the chromia-build-tools docs entrypoint that drives the
# rell-dokka-plugin against the bundled stdlib). HTML lands under per-commit path prefix
# `docs-<slug>-<sha>` so successive runs coexist; the portal points at `index.html` (Dokka's
# entry point). Mirrors `work/build-local-docs.sh` end-to-end.
#
# Extends `.local-chr-cache-no-postgres`: docs generation is pure Dokka, no Postgres needed; we
# still want the persistent ~/.m2 + chromia-cli-local cache so reruns skip the chr rebuild.
pages:docs:
  extends: .local-chr-cache-no-postgres
  stage: portal
  tags: [ saas-linux-medium-amd64 ]
  interruptible: true
  rules:
    - when: manual
      allow_failure: true
  needs: []
  script:
    - ./gradlew $GRADLE_FLAGS_MEDIUM :performance:buildLocalChr
    - mkdir -p public
    # `--enable-native-access=ALL-UNNAMED` mirrors work/build-local-docs.sh — chr's JVM startup
    # logs Foreign API warnings without it. JAVA_ARGS is forwarded by the chr launcher.
    - |
      JAVA_ARGS="${JAVA_ARGS:-} --enable-native-access=ALL-UNNAMED" \
        chromia-cli-local/chromia-cli/target/chromia-cli-dev-dist/bin/chr generate docs-site --system -d public
    - echo "Rell docs - $CI_PAGES_URL/index.html"
  pages:
    path_prefix: "docs-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    expire_in: never
  environment:
    name: "docs/$CI_COMMIT_REF_SLUG/$CI_COMMIT_SHORT_SHA"
    url: "$CI_PAGES_URL/index.html"
  artifacts:
    paths: [ public ]
    expire_in: 30 days
