# Shared anchors for jobs that need a Postgres + Docker host (and, in the case of
# `.local-chr-cache`, a persistent ~/.m2 + chromia-cli build tree). Consumers live in
# `build.yml`, `dependency-check.yml`, and `pages.yml`.
#
# Composition: the `.setup-fragments` job below holds the individual before_script chunks; the
# real `.setup` / `.setup-no-postgres` anchors splice them via `!reference` so jobs can opt out
# of the DIND Postgres without duplicating the docker-CLI install or the Develocity injection.
# `pages:regression` is the only no-postgres consumer today — it manages per-project Postgres
# via Testcontainers from inside the regression toolkit (see regression/src/regression/compile.kt
# `withProjectPostgres`), so the shared DIND instance would just sit idle for it.

.setup-fragments:
  docker-cli-install:
    - microdnf install -y ca-certificates curl tar gzip git glibc-langpack-en
    - |
      DOCKER_VERSION=28.1.1
      curl -fsSL "https://download.docker.com/linux/static/stable/x86_64/docker-${DOCKER_VERSION}.tgz" -o /tmp/docker.tgz
      tar -xzf /tmp/docker.tgz -C /tmp
      install -m 0755 /tmp/docker/docker /usr/local/bin/docker
      rm -rf /tmp/docker /tmp/docker.tgz
    # Materialise DOCKER_AUTH_CONFIG as $HOME/.docker/config.json so the docker CLI (and the
    # docker-java client testcontainers uses) sends Dependency-Proxy credentials when pulling
    # via dind. GitLab Runner only consumes DOCKER_AUTH_CONFIG for its own image/service pulls;
    # `docker run`/`docker pull` issued from job scripts don't see it otherwise.
    - |
      mkdir -p "$HOME/.docker"
      printf '%s' "$DOCKER_AUTH_CONFIG" > "$HOME/.docker/config.json"
  # PGDATA on tmpfs — sized for the full parallel test load (rell-base runs `test`,
  # `testRoundTrip`, `testTruffle` against this single Postgres). The pages:profile job (medium)
  # only needs one schema; the cap is uniform anyway. pages:regression no longer extends `.setup`
  # at all — see `.setup-no-postgres`.
  dind-postgres-start:
    - |
      docker run \
        --detach \
        --name postgres \
        --env POSTGRES_PASSWORD=postchain \
        --env POSTGRES_USER=postchain \
        --env PGDATA=/pgtmpfs \
        --tmpfs=/pgtmpfs:size=8g \
        --publish 5432:5432 \
        ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/postgres:16.14-alpine3.23@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
  # When PUBLISH_BUILD_SCAN=true, inject a Develocity plugin block into settings.gradle.kts.
  # Kept out of git so local devs don't auto-accept ToU; the plugin only reads termsOfUseAgree
  # from a Kotlin DSL block, so an in-flight tracked-file edit is the only way to express it.
  develocity-inject:
    - |
      if [ "$PUBLISH_BUILD_SCAN" = "true" ]; then
        cat >> settings.gradle.kts <<'EOF'

      plugins { id("com.gradle.develocity") version "4.3.2" }

      develocity {
          buildScan {
              termsOfUseUrl = "https://gradle.com/help/legal-terms-of-use"
              termsOfUseAgree = "yes"
              uploadInBackground = false
          }
      }
      EOF
      fi
    - ./gradlew --version

.setup-artifacts:
  artifacts:
    when: always
    paths:
      - $JACOCO_REPORT_DIR/*
      - "**/build/test-results/**/*"
      - build/reports/configuration-cache/**/*
    reports:
      junit: [ "**/build/test-results/**/TEST-*.xml" ]
      coverage_report:
        coverage_format: jacoco
        path: "**/build/reports/jacoco/test/jacocoTestReport.xml"
    expire_in: 1 week

.setup:
  tags: [ saas-linux-xlarge-amd64 ]
  before_script:
    - !reference [ .setup-fragments, docker-cli-install ]
    - !reference [ .setup-fragments, dind-postgres-start ]
    - !reference [ .setup-fragments, develocity-inject ]
  artifacts: !reference [ .setup-artifacts, artifacts ]

# Same as `.setup` but without the DIND Postgres. Used by jobs that bring their own database
# (e.g. pages:regression, which spins one Testcontainers Postgres per project).
.setup-no-postgres:
  tags: [ saas-linux-xlarge-amd64 ]
  before_script:
    - !reference [ .setup-fragments, docker-cli-install ]
    - !reference [ .setup-fragments, develocity-inject ]
  artifacts: !reference [ .setup-artifacts, artifacts ]

.local-chr-cache:
  extends: .setup
  variables:
    # `chr test` (chromia-build-tools `DatabaseModel`) and `chr node start` read CHR_DB_* env
    # vars, falling back to jdbc:postgresql://localhost/postchain. The fallback works on a dev
    # box but not on CI, where Postgres lives on the DIND host `docker`. CHR_DB_URL mirrors
    # POSTCHAIN_DB_URL; credentials match the `docker run ... postgres` invocation in `.setup`.
    CHR_DB_URL: "$POSTCHAIN_DB_URL"
    CHR_DB_USER: "postchain"
    CHR_DB_PASSWORD: "postchain"
  cache:
    - key: "$CI_COMMIT_REF_SLUG"
      fallback_keys: [ dev ]
      paths: [ .gradle ]
      policy: pull-push
    - key: "local-chr-m2-$CI_COMMIT_REF_SLUG"
      fallback_keys: [ local-chr-m2-dev ]
      paths:
        - .m2
        - chromia-cli-local
        - chromia-cli-tools-local
      policy: pull-push
  before_script:
    - !reference [ .setup, before_script ]
    # Symlink ~/.m2 into the project dir so cached deps survive. Remove ~/.m2 first — the
    # GraalVM image ships an empty real dir, which would make `ln -s` nest inside it.
    - rm -rf "$HOME/.m2"
    - mkdir -p "$CI_PROJECT_DIR/.m2/repository"
    - ln -s "$CI_PROJECT_DIR/.m2" "$HOME/.m2"

# Sibling of `.local-chr-cache` for jobs that bring their own database (pages:regression). Skips
# the DIND Postgres + the CHR_DB_* env that pointed at it; keeps the persistent ~/.m2 cache and
# the chromia-cli-local checkout the regression toolkit consumes.
.local-chr-cache-no-postgres:
  extends: .setup-no-postgres
  cache: !reference [ .local-chr-cache, cache ]
  before_script:
    - !reference [ .setup-no-postgres, before_script ]
    - rm -rf "$HOME/.m2"
    - mkdir -p "$CI_PROJECT_DIR/.m2/repository"
    - ln -s "$CI_PROJECT_DIR/.m2" "$HOME/.m2"
