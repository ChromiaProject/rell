# MR-pipeline build + branch-pipeline deploy. Both extend the shared `.setup` (Postgres + DIND +
# Develocity scan toggle); the only difference is the gradle invocation (deploy adds `publish`)
# and the trigger rule.

build:
  extends: .setup
  stage: build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - ./gradlew $GRADLE_FLAGS_LARGE check :coverage-report-aggregate:testCodeCoverageReport
    - "awk -F, 'NR>1 { missed += $4; covered += $5 } END { printf \"Line coverage: %.2f%%\\n\", 100 * covered / (missed + covered) }' $JACOCO_REPORT_DIR/testCodeCoverageReport.csv"
  coverage: '/Line coverage: (\d+\.\d+%)/'

deploy:
  extends: .setup
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH =~ /^version-[0-9]+[.][0-9]+([.][0-9]+)?$/
  script:
    - ./gradlew $GRADLE_FLAGS_LARGE check :coverage-report-aggregate:testCodeCoverageReport publish
    - "awk -F, 'NR>1 { missed += $4; covered += $5 } END { printf \"Line coverage: %.2f%%\\n\", 100 * covered / (missed + covered) }' $JACOCO_REPORT_DIR/testCodeCoverageReport.csv"
  coverage: '/Line coverage: (\d+\.\d+%)/'
