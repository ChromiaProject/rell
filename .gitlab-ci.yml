image: container-registry.oracle.com/graalvm/jdk:21

include:
  - component: $CI_SERVER_FQDN/qodana/qodana/qodana-gitlab-ci@v2025.3
    inputs:
      stage: qodana
      args: --image,jetbrains/qodana-jvm-community:2025.3
  - local: .gitlab/ci/templates.yml
  - local: .gitlab/ci/build.yml
  - local: .gitlab/ci/dependency-check.yml
  - local: .gitlab/ci/pages.yml
  - local: .gitlab/ci/qodana.yml

stages:
  - build
  - deploy
  - dependency-check
  - qodana
  - benchmarks
  - index

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH =~ /^version-[0-9]+[.][0-9]+([.][0-9]+)?$/

variables:
  # Opt-in Develocity build scan publication; override via the manual pipeline UI to investigate.
  PUBLISH_BUILD_SCAN:
    value: "false"
    description: "Set to 'true' to publish a Develocity build scan for this pipeline (visible at scans.gradle.com)."
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  # CI Gradle args — two profiles, picked per job in its script. (qodana runs its own CLI.)
  #   $GRADLE_FLAGS_LARGE  — build/deploy (xlarge 16c/64G) + pages:regression (xlarge 16c/64G)
  #   $GRADLE_FLAGS_MEDIUM — dependency-check, pages:benchmarks, pages:profile (medium 4c/16G)
  # Custom knobs: -Pkotlin.daemon.jvmargs, -PtestJvmMaxHeap (matches build.gradle.kts default),
  # -PjunitParallelThreads, -PgitlabAuthHeaderValue (Package Registry auth token).
  #
  # LARGE budget on xlarge (full test suite):
  #   50g heap caps (12g daemon + 6g kotlin + 8 × 4g test workers) + ~2g Postgres tmpfs
  #   (cap 8g, actual fill is small) + ~6g OS/DIND/non-heap ≈ 58g ≤ 64g ✓. Threads: 8 × 4
  #   JUnit = 32 on 16 vCPU (2× oversub, I/O-bound — fine).
  # Re-used on xlarge for pages:regression: workload is chr fan-out, not Test workers, and each
  # of the 8 worker slots also holds a per-project Testcontainers Postgres for the duration of
  # the pipeline (see regression/src/regression/compile.kt `withProjectPostgres`). Per-slot
  # resident ≈ 2.5g chr orchestrator + 0.5g Postgres ≈ 3g; peak ≈ 4g daemon + 8 × 3g + ~6g
  # infra ≈ 34g ≤ 64g ✓. The previous large-runner (8c/32G) sizing assumed the serial-test
  # model and no longer fits the parallel pipeline.
  GRADLE_FLAGS_LARGE: >-
    -Dorg.gradle.caching=true
    --max-workers=8
    -Dorg.gradle.jvmargs=-Xmx12g
    -Pkotlin.daemon.jvmargs=-Xmx6g
    -PtestJvmMaxHeap=4g
    -PjunitParallelThreads=4
    -PgitlabAuthHeaderValue=$CI_JOB_TOKEN
  # MEDIUM budget on medium:
  #   10g heap caps (4g daemon + 2g kotlin + 1 × 4g test) + ~1g Postgres tmpfs (cap 8g but
  #   medium jobs hold a single schema) + ~2g OS/DIND/non-heap ≈ 13g ≤ 16g ✓. 1 worker × 2
  #   JUnit threads on 4 vCPU — no oversub.
  GRADLE_FLAGS_MEDIUM: >-
    -Dorg.gradle.caching=true
    --max-workers=1
    -Dorg.gradle.jvmargs=-Xmx4g
    -Pkotlin.daemon.jvmargs=-Xmx2g
    -PtestJvmMaxHeap=4g
    -PjunitParallelThreads=2
    -PgitlabAuthHeaderValue=$CI_JOB_TOKEN
  POSTCHAIN_DB_URL: jdbc:postgresql://docker/postchain
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  TESTCONTAINERS_HOST_OVERRIDE: docker
  TESTCONTAINERS_RYUK_DISABLED: "true"
  JACOCO_REPORT_DIR: coverage-report-aggregate/build/reports/jacoco/testCodeCoverageReport
  # Route the dind service pull through the group-level Dependency Proxy
  # (https://docs.gitlab.com/user/packages/dependency_proxy/). Workers run with
  # max_use_count=1, so the local docker image cache is empty on every job and
  # each one pulls dind from registry-1.docker.io through the NAT — both flaky
  # (context-deadline timeouts) and rate-limited. The proxy lives inside GitLab,
  # is reached over HTTPS to gitlab.com, and caches the manifest+layers per group.
  # DOCKER_AUTH_CONFIG lets the runner authenticate to the proxy using the
  # per-job CI_DEPENDENCY_PROXY_USER/PASSWORD predefined variables.
  DOCKER_AUTH_CONFIG: |-
    {"auths":{"$CI_DEPENDENCY_PROXY_SERVER":{"username":"$CI_DEPENDENCY_PROXY_USER","password":"$CI_DEPENDENCY_PROXY_PASSWORD"}}}

services:
  - name: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/docker:28-dind
    alias: docker
    command: [ "--tls=false" ]

cache:
  key: "$CI_COMMIT_REF_SLUG"
  fallback_keys: [ dev ]
  paths: [ .gradle ]
  policy: pull-push
