image: eclipse-temurin:21-jdk-noble

include:
  - component: $CI_SERVER_FQDN/qodana/qodana/qodana-gitlab-ci@v2025.3
    inputs:
      stage: qodana
      args: --image,jetbrains/qodana-jvm-community:2025.3

stages:
  - build
  - deploy
  - dependency-check
  - qodana

variables:
  # Opt-in build scan publication. Defaults to "false" so regular
  # pipelines don't publish; override to "true" via the manual pipeline UI
  # ("Run pipeline" → variables) when investigating a slow or flaky build.
  PUBLISH_BUILD_SCAN:
    value: "false"
    description: "Set to 'true' to publish a Develocity build scan for this pipeline (visible at scans.gradle.com)."
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  # CI-specific Gradle args.
  #   - -Pkotlin.daemon.jvmargs=-Xmx6g: Kotlin compiler daemon heap (Kotlin only reads it only as a project property)
  #
  # Heap budget on saas-linux-xlarge-amd64 (16 vCPU / 64 GiB):
  #   Gradle daemon  12g
  #   Kotlin daemon   6g
  #   Test JVMs       16 workers × 2g = 32g (TEST_JVM_MAX_HEAP × --max-workers)
  #   Headroom       ~14g for Postgres, Docker
  GRADLE_FLAGS: "-Dorg.gradle.caching=true -Dorg.gradle.jvmargs=-Xmx12g -Pkotlin.daemon.jvmargs=-Xmx6g"
  # Heap for forked test JVMs (read by build.gradle.kts).
  TEST_JVM_MAX_HEAP: "2g"
  ORG_GRADLE_PROJECT_gitlabAuthHeaderValue: $CI_JOB_TOKEN
  POSTCHAIN_DB_URL: jdbc:postgresql://docker/postchain
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  TESTCONTAINERS_HOST_OVERRIDE: docker
  TESTCONTAINERS_RYUK_DISABLED: "true"
  JACOCO_REPORT_DIR: coverage-report-aggregate/build/reports/jacoco/testCodeCoverageReport

services:
  - name: docker:28-dind
    alias: docker
    command: [ "--tls=false" ]

cache:
  key: "$CI_COMMIT_REF_SLUG"
  fallback_keys:
    - dev
  paths:
    - .gradle
  policy: pull-push

.setup:
  tags: [ saas-linux-xlarge-amd64 ]
  before_script:
    - apt-get update && apt-get install -y ca-certificates curl gnupg jq
    - install -m 0755 -d /etc/apt/keyrings
    - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu noble stable" > /etc/apt/sources.list.d/docker.list
    - apt-get update && apt-get install -y docker-ce-cli
    - docker run
      --detach
      --name postgres
      --env POSTGRES_PASSWORD=postchain
      --env POSTGRES_USER=postchain
      --env PGDATA=/pgtmpfs
      --tmpfs=/pgtmpfs:size=1000m
      --publish 5432:5432
      postgres:16.13-alpine3.23@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    - chmod +x gradlew
    # When PUBLISH_BUILD_SCAN=true, append a Develocity plugin block to settings.gradle.kts in flight.
    # The plugin is intentionally NOT committed so that local devs neither pull the plugin dependency nor have ToU
    # auto-accepted on their behalf. The Develocity 4.x plugin only reads termsOfUseAgree from a Kotlin DSL block, so a
    # tracked-file edit is the only way to express it.
    #
    - |
      if [ "$PUBLISH_BUILD_SCAN" = "true" ]; then
        cat >> settings.gradle.kts <<'EOF'

      plugins { id("com.gradle.develocity") version "4.3.2" }

      develocity {
          buildScan {
              termsOfUseUrl = "https://gradle.com/help/legal-terms-of-use"
              termsOfUseAgree = "yes"
              uploadInBackground = false
          }
      }
      EOF
      fi
    - ./gradlew $GRADLE_FLAGS --version
  artifacts:
    when: always
    paths:
      - $JACOCO_REPORT_DIR/*
      - "**/build/test-results/**/*"
      - build/reports/configuration-cache/**/*
    reports:
      junit: [ "**/build/test-results/**/TEST-*.xml" ]
      coverage_report:
        coverage_format: jacoco
        path: "**/build/reports/jacoco/test/jacocoTestReport.xml"
    expire_in: 1 week

build:
  extends: .setup
  stage: build
  except:
    - master
    - dev
    - /^version-[0-9]+[.][0-9]+([.][0-9]+)?$/
  script:
    - ./gradlew $GRADLE_FLAGS check :coverage-report-aggregate:testCodeCoverageReport
    - "awk -F, 'NR>1 { missed += $4; covered += $5 } END { printf \"Line coverage: %.2f%%\\n\", 100 * covered / (missed + covered) }' $JACOCO_REPORT_DIR/testCodeCoverageReport.csv"
  coverage: '/Line coverage: (\d+\.\d+%)/'

deploy:
  extends: .setup
  stage: deploy
  only:
    - master
    - dev
    - /^version-[0-9]+[.][0-9]+([.][0-9]+)?$/
  script:
    - ./gradlew $GRADLE_FLAGS check :coverage-report-aggregate:testCodeCoverageReport publish -PgenerateTestCases
    - "awk -F, 'NR>1 { missed += $4; covered += $5 } END { printf \"Line coverage: %.2f%%\\n\", 100 * covered / (missed + covered) }' $JACOCO_REPORT_DIR/testCodeCoverageReport.csv"
  coverage: '/Line coverage: (\d+\.\d+%)/'

dependency-check:
  extends: .setup
  stage: dependency-check
  interruptible: true
  only:
    variables:
      - $RUN_DEPENDENCY_CHECK == "true"
  script: [ "./gradlew $GRADLE_FLAGS dependencyCheckAggregate" ]
  artifacts:
    when: always
    paths: [ build/reports/dependency-check-report.* ]

qodana:
  tags: [ saas-linux-xlarge-amd64 ]
  variables:
    QODANA_MR_MODE: "false"
  rules:
    - if: $CI_PIPELINE_SOURCE != "merge_request_event"
