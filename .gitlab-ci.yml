image: container-registry.oracle.com/graalvm/jdk:21

include:
  - component: $CI_SERVER_FQDN/qodana/qodana/qodana-gitlab-ci@v2025.3
    inputs:
      stage: qodana
      args: --image,jetbrains/qodana-jvm-community:2025.3

stages:
  - build
  - deploy
  - dependency-check
  - qodana
  - benchmarks
  - index

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH =~ /^version-[0-9]+[.][0-9]+([.][0-9]+)?$/

variables:
  # Opt-in build scan publication. Defaults to "false" so regular pipelines don't publish;
  # override to "true" via the manual pipeline UI ("Run pipeline" → variables) when investigating a slow or flaky build.
  PUBLISH_BUILD_SCAN:
    value: "false"
    description: "Set to 'true' to publish a Develocity build scan for this pipeline (visible at scans.gradle.com)."
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  # CI-specific Gradle args — all build tuning lives here.
  #   -Pkotlin.daemon.jvmargs  Kotlin compiler daemon heap (only reads project properties)
  #   -PtestJvmMaxHeap         Forked test JVM heap (default 4g in build.gradle.kts)
  #   -PjunitParallelThreads   JUnit ForkJoinPool threads per test worker (unset = availableProcessors())
  #   -PgitlabAuthHeaderValue  GitLab Package Registry auth token
  #
  # Heap budget on saas-linux-xlarge-amd64 (16 vCPU / 64 GiB):
  #   Gradle daemon  12g
  #   Kotlin daemon   6g
  #   Test JVMs       8 workers × 4g = 32g (testJvmMaxHeap × --max-workers)
  #   Headroom       ~14g for Postgres, Docker
  #
  # Thread budget (16 vCPU):
  #   8 Gradle workers × 4 JUnit threads = 32 runnable threads.
  #   Most are I/O-bound (DB round-trips), so moderate over-subscription is fine.
  GRADLE_FLAGS: >-
    -Dorg.gradle.caching=true
    --max-workers=8
    -Dorg.gradle.jvmargs=-Xmx12g
    -Pkotlin.daemon.jvmargs=-Xmx6g
    -PtestJvmMaxHeap=4g
    -PjunitParallelThreads=4
    -PgitlabAuthHeaderValue=$CI_JOB_TOKEN
  # Reduced profile for constrained runners (≤16 GiB total RAM): self-hosted weak boxes
  # (WEAK_RUNNER=true in their config.toml) and the saas-linux-medium-amd64 jobs below
  # (dependency-check, pages:benchmarks, pages:profile) that set WEAK_RUNNER=true via job variables.
  #   Gradle daemon  4g
  #   Kotlin daemon  2g
  #   Test JVMs      1 worker × 4g = 4g
  #   Headroom      ~2g for Postgres (disk-backed), Docker
  GRADLE_FLAGS_WEAK: >-
    -Dorg.gradle.caching=true
    --max-workers=1
    -Dorg.gradle.jvmargs=-Xmx4g
    -Pkotlin.daemon.jvmargs=-Xmx2g
    -PtestJvmMaxHeap=4g
    -PjunitParallelThreads=2
    -PgitlabAuthHeaderValue=$CI_JOB_TOKEN
  POSTCHAIN_DB_URL: jdbc:postgresql://docker/postchain
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  TESTCONTAINERS_HOST_OVERRIDE: docker
  TESTCONTAINERS_RYUK_DISABLED: "true"
  JACOCO_REPORT_DIR: coverage-report-aggregate/build/reports/jacoco/testCodeCoverageReport

services:
  - name: docker:28-dind
    alias: docker
    command: [ "--tls=false" ]

cache:
  key: "$CI_COMMIT_REF_SLUG"
  fallback_keys:
    - dev
  paths:
    - .gradle
  policy: pull-push

.setup:
  tags: [ saas-linux-xlarge-amd64 ]
  before_script:
    - |
      if [ "${WEAK_RUNNER:-}" = "true" ]; then
        export GRADLE_FLAGS="$GRADLE_FLAGS_WEAK"
        echo "Weak runner detected — using reduced memory profile (4g/2g/4g×1)"
      fi
    - microdnf install -y ca-certificates curl tar gzip git glibc-langpack-en
    - |
      DOCKER_VERSION=28.1.1
      curl -fsSL "https://download.docker.com/linux/static/stable/x86_64/docker-${DOCKER_VERSION}.tgz" -o /tmp/docker.tgz
      tar -xzf /tmp/docker.tgz -C /tmp
      install -m 0755 /tmp/docker/docker /usr/local/bin/docker
      rm -rf /tmp/docker /tmp/docker.tgz
    - |
      # Sized for the full parallel test load: rell-base now runs `test`, `testRoundTrip`,
      # and `testTruffle` against this single Postgres, alongside tests in other modules.
      # 1000m filled up under that load and the daemon died, causing "connection refused"
      # in dependent test workers.
      PGDATA_ARGS="--env PGDATA=/pgtmpfs --tmpfs=/pgtmpfs:size=8g"
      if [ "${WEAK_RUNNER:-}" = "true" ]; then
        PGDATA_ARGS=""
      fi
      docker run \
        --detach \
        --name postgres \
        --env POSTGRES_PASSWORD=postchain \
        --env POSTGRES_USER=postchain \
        $PGDATA_ARGS \
        --publish 5432:5432 \
        postgres:16.13-alpine3.23@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    - chmod +x gradlew
    # When PUBLISH_BUILD_SCAN=true, append a Develocity plugin block to settings.gradle.kts in flight.
    # The plugin is intentionally NOT committed so that local devs neither pull the plugin dependency nor have ToU
    # auto-accepted on their behalf. The Develocity 4.x plugin only reads termsOfUseAgree from a Kotlin DSL block, so a
    # tracked-file edit is the only way to express it.
    #
    - |
      if [ "$PUBLISH_BUILD_SCAN" = "true" ]; then
        cat >> settings.gradle.kts <<'EOF'

      plugins { id("com.gradle.develocity") version "4.3.2" }

      develocity {
          buildScan {
              termsOfUseUrl = "https://gradle.com/help/legal-terms-of-use"
              termsOfUseAgree = "yes"
              uploadInBackground = false
          }
      }
      EOF
      fi
    - ./gradlew $GRADLE_FLAGS --version
  artifacts:
    when: always
    paths:
      - $JACOCO_REPORT_DIR/*
      - "**/build/test-results/**/*"
      - build/reports/configuration-cache/**/*
    reports:
      junit: [ "**/build/test-results/**/TEST-*.xml" ]
      coverage_report:
        coverage_format: jacoco
        path: "**/build/reports/jacoco/test/jacocoTestReport.xml"
    expire_in: 1 week

.local-chr-cache:
  extends: .setup
  variables:
    # `chr test` (chromia-build-tools `DatabaseModel`) reads its Postgres connection from the
    # CHR_DB_* env vars, falling back to jdbc:postgresql://localhost/postchain. That default
    # only works on a dev box — on CI the Postgres `.setup` starts lives on the DIND host
    # `docker`, so without these the regression `chr test` step (and the `chr node start` in
    # pages:profile) fails with connection-refused, i.e. "missing DB" rather than a real
    # compiler regression. CHR_DB_URL reuses POSTCHAIN_DB_URL (same docker host + `postchain`
    # database); credentials match the `docker run ... postgres` invocation in `.setup`.
    CHR_DB_URL: "$POSTCHAIN_DB_URL"
    CHR_DB_USER: "postchain"
    CHR_DB_PASSWORD: "postchain"
  cache:
    - key: "$CI_COMMIT_REF_SLUG"
      fallback_keys: [ dev ]
      paths: [ .gradle ]
      policy: pull-push
    - key: "local-chr-m2-$CI_COMMIT_REF_SLUG"
      fallback_keys: [ local-chr-m2-dev ]
      paths:
        - .m2
        - chromia-cli-local
        - chromia-cli-tools-local
      policy: pull-push
  before_script:
    - !reference [ .setup, before_script ]
    # Symlink ~/.m2 into the project dir so cached deps survive. Remove the existing
    # ~/.m2 first — the GraalVM base image ships an empty one as a real directory,
    # which would cause `ln -s` to nest the symlink inside it.
    - rm -rf "$HOME/.m2"
    - mkdir -p "$CI_PROJECT_DIR/.m2/repository"
    - ln -s "$CI_PROJECT_DIR/.m2" "$HOME/.m2"

build:
  extends: .setup
  stage: build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - ./gradlew $GRADLE_FLAGS check :coverage-report-aggregate:testCodeCoverageReport
    - "awk -F, 'NR>1 { missed += $4; covered += $5 } END { printf \"Line coverage: %.2f%%\\n\", 100 * covered / (missed + covered) }' $JACOCO_REPORT_DIR/testCodeCoverageReport.csv"
  coverage: '/Line coverage: (\d+\.\d+%)/'

deploy:
  extends: .setup
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH =~ /^version-[0-9]+[.][0-9]+([.][0-9]+)?$/
  script:
    - ./gradlew $GRADLE_FLAGS check :coverage-report-aggregate:testCodeCoverageReport publish
    - "awk -F, 'NR>1 { missed += $4; covered += $5 } END { printf \"Line coverage: %.2f%%\\n\", 100 * covered / (missed + covered) }' $JACOCO_REPORT_DIR/testCodeCoverageReport.csv"
  coverage: '/Line coverage: (\d+\.\d+%)/'

dependency-check:
  extends: .setup
  stage: dependency-check
  tags: [ saas-linux-medium-amd64 ]
  interruptible: true
  variables: { WEAK_RUNNER: "true" }
  rules:
    - if: $RUN_DEPENDENCY_CHECK == "true"
  # --no-parallel: dependencyCheckAggregate resolves every subproject's configurations from the
  # root project. With org.gradle.parallel=true (gradle.properties), Gradle 9 rejects that
  # cross-project resolution ("attempted without an exclusive lock").
  script: [ "./gradlew $GRADLE_FLAGS --no-configuration-cache --no-parallel dependencyCheckAggregate" ]
  artifacts:
    when: always
    paths: [ build/reports/dependency-check-report.* ]

# Client-side reports app (index.html) listing every currently-available `pages:benchmarks` /
# `pages:profile` / `pages:regression` deployment, with a profile-diff tool. The project is
# private, so anonymous client-side fetches against the Environments API return 401 — instead,
# build-index.sh bakes the deployment list into a static `manifest.json` at publish time via
# `glab api`, and the app fetches that (and the per-deployment data/main.json files) from the
# browser. Republished on every dev pipeline so the list stays fresh as branches come and go;
# pinned to dev so feature branches can't overwrite the root deployment.
#
# Requires GITLAB_TOKEN — a project access token with `read_api` scope, exposed as a
# masked, dev-branch-protected CI variable. CI_JOB_TOKEN is *not* sufficient: GitLab's
# allowlist for that token excludes the Environments API and the call 403s.
#
# Also re-published in the `index` stage after each manual `pages:benchmarks` /
# `pages:profile` is triggered (see `pages:index:after-bench`/`-profile` below). That keeps
# the listing fresh when manual jobs are clicked days after the initial dev pipeline ran;
# without those follow-up jobs the index would still show the pre-click state because the
# deploy-stage publication ran before the manual job existed.
.pages-index:
  image: registry.gitlab.com/gitlab-org/cli:latest
  interruptible: true
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
  script:
    - apk add --no-cache jq curl
    - mkdir -p public
    - performance/ci-index/build-index.sh public
  pages: true
  environment:
    name: pages-index
    url: "$CI_PAGES_URL/"
  artifacts:
    paths: [ public ]
    expire_in: 30 days

pages:index:
  extends: .pages-index
  stage: deploy
  needs: []

# Re-publish the index after a manual `pages:benchmarks` is clicked, so the new per-commit
# deployment shows up in the listing. `needs:` blocks until the manual job is triggered;
# if it is never clicked, this job stays pending alongside it (harmless — same lifecycle
# as the manual job itself). The deploy-stage `pages:index` already covered the no-click
# case, so this purely fills the "manual click days later" gap. Same pattern for profile.
pages:index:after-bench:
  extends: .pages-index
  stage: index
  needs: [ pages:benchmarks ]

pages:index:after-profile:
  extends: .pages-index
  stage: index
  needs: [ pages:profile ]

pages:index:after-regression:
  extends: .pages-index
  stage: index
  needs: [ pages:regression ]

# Manual benchmark / profile runs that publish HTML reports to GitLab Pages under per-commit
# path prefixes (`bench-<slug>-<sha>` / `profile-<slug>-<sha>`). Including the short SHA in
# the prefix and environment name means same-branch reruns no longer clobber each other —
# regression analysis between commits on the same branch needs both deployments to coexist.
# URLs: https://<group>.gitlab.io/<project>/bench-<branch-slug>-<sha>/report.html
#       https://<group>.gitlab.io/<project>/profile-<branch-slug>-<sha>/report.html
# Each deployment also exposes the parseable benchmark JSON at /data/main.json so external
# tooling (or the LLM analysis path) can fetch raw scores without scraping HTML.
pages:benchmarks:
  stage: benchmarks
  tags: [ saas-linux-medium-amd64 ]
  interruptible: true
  rules:
    - when: manual
      allow_failure: true
  needs: []
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    fallback_keys: [ dev ]
    paths: [ .gradle ]
    policy: pull-push
  script:
    - chmod +x gradlew
    - ./gradlew $GRADLE_FLAGS_WEAK :performance:mainBenchmark
    - mkdir -p public public/data
    - cp -r performance/build/reports/benchmarks/html/. public/
    # Publish the raw kotlinx-benchmark JSON alongside the HTML so it can be ingested
    # programmatically (e.g. for commit-to-commit regression diffs). The plugin writes the
    # result to `reports/benchmarks/main/<timestamp>/main.json`; pick the newest one and
    # expose it at a stable URL `<deployment>/data/main.json`.
    - |
      latest_json=$(find performance/build/reports/benchmarks/main -type f -name '*.json' -printf '%T@ %p\n' | sort -nr | head -n1 | cut -d' ' -f2-)
      if [ -z "$latest_json" ]; then
        echo "ERROR: no benchmark JSON found under performance/build/reports/benchmarks/main" >&2
        exit 1
      fi
      cp "$latest_json" public/data/main.json
      echo "Published $latest_json -> public/data/main.json"
    - echo "Benchmark report - $CI_PAGES_URL/report.html"
    - echo "Benchmark JSON   - $CI_PAGES_URL/data/main.json"
  pages:
    path_prefix: "bench-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    expire_in: never
  environment:
    name: "benchmarks/$CI_COMMIT_REF_SLUG/$CI_COMMIT_SHORT_SHA"
    url: "$CI_PAGES_URL/report.html"
  artifacts:
    paths: [ public ]
    expire_in: 30 days

# Manual end-to-end profiler run (Postgres + chr node + async-profiler + workload + HTML).
# Extends `.local-chr-cache` for the Postgres-via-DIND wiring and the persistent .m2 cache;
# the pg_stats collector reaches Postgres via POSTCHAIN_DB_URL and the `chr node` it builds
# via :performance:buildLocalChr reaches it via the CHR_DB_* vars — both point at the DIND service.
pages:profile:
  extends: .local-chr-cache
  stage: benchmarks
  tags: [ saas-linux-medium-amd64 ]
  interruptible: true
  variables: { WEAK_RUNNER: "true" }
  rules:
    - when: manual
      allow_failure: true
  needs: []
  script:
    - ./gradlew $GRADLE_FLAGS :performance:profile
    - mkdir -p public
    - cp -r performance/reports/. public/
    - echo "Profile report - $CI_PAGES_URL/report.html"
  pages:
    path_prefix: "profile-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    expire_in: never
  environment:
    name: "profile/$CI_COMMIT_REF_SLUG/$CI_COMMIT_SHORT_SHA"
    url: "$CI_PAGES_URL/report.html"
  artifacts:
    when: always
    paths: [ public ]
    expire_in: 30 days

# Manual regression toolkit: clone every public Rell project and verify the local Rell build
# compiles them. Deliberately not on the default pipeline — full runs take tens of minutes (one
# bootstrap-once chromia-cli build + per-project chr install/build/test). The public-only flavour
# is wired here; `private.json` is gitignored and never reaches the runner.
#
# Extends `.local-chr-cache` (and through it `.setup`) for git/bash/curl install, the
# GRADLE_FLAGS_WEAK profile via WEAK_RUNNER, the persistent .m2 cache, and the Postgres the
# per-project `chr test` step connects to via the CHR_DB_* vars set in `.local-chr-cache`.
#
# URL: https://<group>.gitlab.io/<project>/regression-<branch-slug>-<sha>/report.html
# The reports index (performance/ci-index/) lists every regression deployment alongside the
# existing benchmark and profile deployments. Expect a non-zero failure count — historical /
# FT3-era projects are marked `expectedFailure:true` in public.json so they don't show up as
# regressions, but the job is `allow_failure: true` regardless so a single compile blowup
# doesn't red the pipeline.
pages:regression:
  extends: .local-chr-cache
  stage: benchmarks
  tags: [ saas-linux-medium-amd64 ]
  interruptible: true
  variables:
    WEAK_RUNNER: "true"
  rules:
    - when: manual
      allow_failure: true
  needs: []
  script:
    - ./gradlew $GRADLE_FLAGS :regression:regressionPublic
    - mkdir -p public
    - cp -r regression/reports/. public/
    - echo "Regression report - $CI_PAGES_URL/report.html"
  pages:
    path_prefix: "regression-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    expire_in: never
  environment:
    name: "regression/$CI_COMMIT_REF_SLUG/$CI_COMMIT_SHORT_SHA"
    url: "$CI_PAGES_URL/report.html"
  artifacts:
    when: always
    paths: [ public ]
    expire_in: 30 days

qodana:
  tags: [ saas-linux-large-amd64 ]
  variables: { QODANA_MR_MODE: "true" }
  cache:
    key: "qodana-$CI_COMMIT_REF_SLUG"
    fallback_keys: [ qodana-dev ]
    paths: [ .qodana/cache ]
    policy: pull-push
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
      variables: { QODANA_MR_MODE: "false" }
  artifacts:
    paths: [ .qodana/results/qodana.sarif.json ]
    when: always
    expire_in: 1 week
